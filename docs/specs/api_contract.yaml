## GET /health

- **Description**: Health check (used by Cloud Run)  
- **Auth required**: No  

### Responses

#### 200 OK
```json
{
  "status": "healthy"
}
```

| Field  | Type   | Description  |
|--------|--------|--------------|
| status | string | Always "healthy" |